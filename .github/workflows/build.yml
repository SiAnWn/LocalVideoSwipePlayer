name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build .app
        run: |
          xcodebuild build \
            -project LocalVideoSwipePlayer.xcodeproj \
            -scheme LocalVideoSwipePlayer \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="build"

      - name: Create Payload folder
        run: |
          mkdir Payload
          cp -R build/LocalVideoSwipePlayer.app Payload/

      - name: Zip to IPA
        run: zip -r LocalVideoSwipePlayer.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: LocalVideoSwipePlayer
          path: LocalVideoSwipePlayer.ipa
